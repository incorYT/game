<!DOCTYPE html>
<html>
<head>
  <title>Importer</title>
  <style>
    body {
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .box {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    #fileBox {
      margin-top: 20px;
      padding: 15px;
      background: #333;
      border-radius: 8px;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>

  <div class="box">
    <input type="file" id="fileInput">
    <div id="fileBox">Open Imported File</div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const fileBox = document.getElementById("fileBox");
    let fileURL = null;

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;

      fileURL = URL.createObjectURL(file);
      fileBox.style.display = "block";
    });

    fileBox.addEventListener("click", () => {
      if (fileURL) {
        window.open(fileURL, "_blank");
      }
    });
  </script>

</body>
</html>
