<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>File Import</title>
    <style>
        body {
            background: black;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .upload-box {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        label {
            color: white;
            font-size: 18px;
        }

        input[type="file"] {
            margin-top: 15px;
            color: white;
        }
    </style>
</head>
<body>

    <div class="upload-box">
        <label>Select a file to import:</label><br>
        <input type="file">
    </div>

</body>
</html>
